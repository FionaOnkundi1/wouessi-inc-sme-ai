<!-- 
  WOUESSI COLOUR PICKER
  Drop this block anywhere before </body> in any template.
  It adds a floating colour panel that lets users customise their site in real time.
  The backend saves the chosen colours and injects them as CSS variables on next load.
-->

<div id="wColourPanel">
  <button id="wColourToggle" title="Customise colours">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
      <circle cx="13.5" cy="6.5" r="2.5"/><circle cx="19" cy="13" r="2.5"/>
      <circle cx="6" cy="12" r="2.5"/><circle cx="10.5" cy="19.5" r="2.5"/>
      <path d="M13.5 9C13.5 9 12 15 10.5 17"/>
      <path d="M6 14.5C6 14.5 8 17 10.5 17"/>
      <path d="M13.5 9C13.5 9 16 10 16.5 10.5"/>
    </svg>
    Colours
  </button>

  <div id="wColourDrawer">
    <div class="wcp-header">
      <span class="wcp-title">Customise Brand</span>
      <button class="wcp-close" onclick="toggleColourPanel()">✕</button>
    </div>

    <!-- Style presets -->
    <div class="wcp-section">
      <div class="wcp-label">Style presets</div>
      <div class="wcp-presets" id="wPresets">
        <!-- Populated by JS based on detected template -->
      </div>
    </div>

    <!-- Custom colours -->
    <div class="wcp-section">
      <div class="wcp-label">Custom colours</div>
      <div class="wcp-colour-row">
        <div class="wcp-colour-field">
          <label class="wcp-colour-label">Primary</label>
          <div class="wcp-colour-input-wrap">
            <input type="color" id="wPrimaryColor" class="wcp-color-input"/>
            <input type="text" id="wPrimaryHex" class="wcp-hex-input" placeholder="#000000" maxlength="7"/>
          </div>
        </div>
        <div class="wcp-colour-field">
          <label class="wcp-colour-label">Background</label>
          <div class="wcp-colour-input-wrap">
            <input type="color" id="wBgColor" class="wcp-color-input"/>
            <input type="text" id="wBgHex" class="wcp-hex-input" placeholder="#FFFFFF" maxlength="7"/>
          </div>
        </div>
        <div class="wcp-colour-field">
          <label class="wcp-colour-label">Accent</label>
          <div class="wcp-colour-input-wrap">
            <input type="color" id="wAccentColor" class="wcp-color-input"/>
            <input type="text" id="wAccentHex" class="wcp-hex-input" placeholder="#888888" maxlength="7"/>
          </div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="wcp-actions">
      <button class="wcp-reset" onclick="resetColours()">Reset</button>
      <button class="wcp-save" onclick="saveColours()">Save colours</button>
    </div>

    <div class="wcp-saved" id="wSavedMsg">✓ Colours saved!</div>
  </div>
</div>

<style>
#wColourPanel {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 99999;
  font-family: -apple-system, 'Segoe UI', sans-serif;
}

#wColourToggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  background: #1a1a1a;
  color: #fff;
  border: none;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  transition: transform 0.15s, background 0.15s;
}
#wColourToggle:hover { background: #333; transform: translateY(-1px); }

#wColourDrawer {
  position: absolute;
  bottom: 52px;
  right: 0;
  width: 300px;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  border: 1px solid #eee;
  overflow: hidden;
  display: none;
  flex-direction: column;
}
#wColourDrawer.open { display: flex; animation: wSlideUp 0.22s ease; }

@keyframes wSlideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.wcp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid #f0f0f0;
}
.wcp-title { font-size: 13px; font-weight: 700; color: #111; }
.wcp-close { background: none; border: none; font-size: 16px; color: #888; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
.wcp-close:hover { background: #f5f5f5; color: #111; }

.wcp-section { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; }
.wcp-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #aaa; margin-bottom: 10px; }

/* Presets */
.wcp-presets { display: flex; flex-wrap: wrap; gap: 8px; }
.wcp-preset {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 12px;
  border: 1.5px solid #eee;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 500;
  color: #555;
  cursor: pointer;
  background: #fff;
  transition: all 0.15s;
}
.wcp-preset:hover { border-color: #ccc; color: #111; }
.wcp-preset.active { border-color: #1a1a1a; color: #111; background: #f5f5f5; }
.wcp-preset-swatch { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.1); }

/* Colour inputs */
.wcp-colour-row { display: flex; flex-direction: column; gap: 10px; }
.wcp-colour-field { display: flex; flex-direction: column; gap: 5px; }
.wcp-colour-label { font-size: 11px; font-weight: 600; color: #666; }
.wcp-colour-input-wrap { display: flex; align-items: center; gap: 8px; }

.wcp-color-input {
  width: 36px; height: 36px;
  border: 1.5px solid #eee; border-radius: 8px;
  padding: 2px; cursor: pointer; background: none;
}
.wcp-color-input::-webkit-color-swatch-wrapper { padding: 0; }
.wcp-color-input::-webkit-color-swatch { border: none; border-radius: 5px; }

.wcp-hex-input {
  flex: 1; font-family: 'Courier New', monospace; font-size: 13px;
  padding: 8px 10px; border: 1.5px solid #eee; border-radius: 8px;
  color: #111; outline: none; transition: border-color 0.15s;
}
.wcp-hex-input:focus { border-color: #aaa; }

/* Actions */
.wcp-actions { display: flex; gap: 8px; padding: 14px 16px; }
.wcp-reset {
  flex: 1; padding: 9px; border: 1.5px solid #eee; border-radius: 8px;
  font-size: 12px; font-weight: 600; color: #666; background: #fff; cursor: pointer;
  transition: all 0.15s;
}
.wcp-reset:hover { border-color: #ccc; color: #111; }
.wcp-save {
  flex: 2; padding: 9px; border: none; border-radius: 8px;
  font-size: 12px; font-weight: 700; color: #fff; background: #1a1a1a; cursor: pointer;
  transition: background 0.15s;
}
.wcp-save:hover { background: #333; }

.wcp-saved {
  display: none;
  text-align: center;
  padding: 10px;
  font-size: 12px;
  font-weight: 600;
  color: #2e7d32;
  background: #f0f7f0;
}
</style>

<script>
(function() {

  // ── DETECT TEMPLATE ──────────────────────────────────────────────
  // Backend should set window.WOUESSI_TEMPLATE = 'retail' | 'trade' | 'hospitality' | 'professional'
  const TEMPLATE = window.WOUESSI_TEMPLATE || 'retail'

  // ── PRESET DEFINITIONS ──────────────────────────────────────────
  // Each preset maps to CSS variable overrides for that template
  const PRESETS = {
    retail: [
      { key: 'warm',    name: 'Warm',        swatch: '#7A5C3A', vars: { '--bark': '#7A5C3A', '--cream': '#F7F3EE', '--warm': '#EDE5D8', '--tan': '#C9B99A', '--char': '#1E1A16' } },
      { key: 'luxury',  name: 'Luxury',      swatch: '#B8965A', vars: { '--bark': '#B8965A', '--cream': '#F8F6F0', '--warm': '#EDE8DC', '--tan': '#B8965A', '--char': '#111111' } },
      { key: 'minimal', name: 'Minimal',     swatch: '#333333', vars: { '--bark': '#333333', '--cream': '#FAFAFA', '--warm': '#F0F0F0', '--tan': '#AAAAAA', '--char': '#111111' } },
      { key: 'berry',   name: 'Berry',       swatch: '#8B2252', vars: { '--bark': '#8B2252', '--cream': '#FDF5F8', '--warm': '#F5E0EA', '--tan': '#C4708A', '--char': '#1A0A12' } },
      { key: 'forest',  name: 'Forest',      swatch: '#3D6B2A', vars: { '--bark': '#3D6B2A', '--cream': '#F3F7F0', '--warm': '#E2EDD9', '--tan': '#7AAB65', '--char': '#1A2415' } },
      { key: 'ocean',   name: 'Ocean',       swatch: '#1E5F8A', vars: { '--bark': '#1E5F8A', '--cream': '#F0F5FA', '--warm': '#DDE8F5', '--tan': '#6A9EC5', '--char': '#0E1E2E' } },
    ],
    trade: [
      { key: 'orange',  name: 'Orange',      swatch: '#F05A28', vars: { '--orange': '#F05A28', '--orange-d': '#C44420', '--bg': '#0E1117', '--surface': '#161B25' } },
      { key: 'yellow',  name: 'Yellow',      swatch: '#F5D800', vars: { '--orange': '#F5D800', '--orange-d': '#C4AC00', '--bg': '#0D0D0D', '--surface': '#1A1A1A' } },
      { key: 'blue',    name: 'Blue',        swatch: '#3A7BD5', vars: { '--orange': '#3A7BD5', '--orange-d': '#2A5BA5', '--bg': '#0A0E18', '--surface': '#131826' } },
      { key: 'green',   name: 'Green',       swatch: '#2ECC71', vars: { '--orange': '#2ECC71', '--orange-d': '#27AE60', '--bg': '#0A100A', '--surface': '#121812' } },
      { key: 'red',     name: 'Red',         swatch: '#E53935', vars: { '--orange': '#E53935', '--orange-d': '#B71C1C', '--bg': '#100A0A', '--surface': '#1A1010' } },
    ],
    hospitality: [
      { key: 'terra',   name: 'Terracotta',  swatch: '#C4622D', vars: { '--terracotta': '#C4622D', '--terra-d': '#9E4E24', '--bg': '#FDFAF5', '--warm': '#F5EDE0' } },
      { key: 'modern',  name: 'Modern',      swatch: '#1A1A1A', vars: { '--terracotta': '#1A1A1A', '--terra-d': '#333333', '--bg': '#F8F8F6', '--warm': '#EFEFEB' } },
      { key: 'med',     name: 'Mediterranean', swatch: '#1A6B8A', vars: { '--terracotta': '#1A6B8A', '--terra-d': '#145570', '--bg': '#FDF8F0', '--warm': '#F0E8D8' } },
      { key: 'vibrant', name: 'Vibrant',     swatch: '#2ECC71', vars: { '--terracotta': '#2ECC71', '--terra-d': '#27AE60', '--bg': '#FAFFF5', '--warm': '#EDF7E0' } },
      { key: 'dark',    name: 'Dark',        swatch: '#D4A853', vars: { '--terracotta': '#D4A853', '--terra-d': '#B8924A', '--bg': '#0F0F0F', '--warm': '#1A1A1A', '--char': '#FFFFFF', '--mid': '#AAAAAA', '--light': '#555555', '--card': '#222222' } },
    ],
    professional: [
      { key: 'gold',    name: 'Gold',        swatch: '#B8965A', vars: { '--gold': '#B8965A', '--ink': '#111111', '--bg': '#F9F9F7' } },
      { key: 'luxury',  name: 'Luxury',      swatch: '#C9A84C', vars: { '--gold': '#C9A84C', '--ink': '#0A0A0A', '--bg': '#FAFAFA' } },
      { key: 'blue',    name: 'Corporate',   swatch: '#1E5FA5', vars: { '--gold': '#1E5FA5', '--ink': '#0E1E3A', '--bg': '#F5F7FA' } },
      { key: 'sage',    name: 'Sage',        swatch: '#4A7A4A', vars: { '--gold': '#4A7A4A', '--ink': '#1A2A1A', '--bg': '#F5F7F5' } },
      { key: 'dark',    name: 'Dark',        swatch: '#D4A853', vars: { '--gold': '#D4A853', '--ink': '#F5F5F5', '--bg': '#111111', '--surface': '#1A1A1A', '--light': '#333333', '--mid': '#888888' } },
    ],
  }

  const presets = PRESETS[TEMPLATE] || PRESETS.retail
  let activePreset = null
  let originalVars = {}

  // ── SAVE ORIGINAL CSS VARIABLES ─────────────────────────────────
  function saveOriginals() {
    const style = getComputedStyle(document.documentElement)
    const allPresetVars = presets.flatMap(p => Object.keys(p.vars))
    const unique = [...new Set(allPresetVars)]
    unique.forEach(v => {
      originalVars[v] = style.getPropertyValue(v).trim()
    })
  }

  // ── APPLY CSS VARIABLES ──────────────────────────────────────────
  function applyVars(vars) {
    Object.entries(vars).forEach(([key, val]) => {
      document.documentElement.style.setProperty(key, val)
    })
  }

  // ── RENDER PRESETS ───────────────────────────────────────────────
  function renderPresets() {
    const container = document.getElementById('wPresets')
    container.innerHTML = presets.map(p => `
      <button class="wcp-preset ${activePreset === p.key ? 'active' : ''}"
              onclick="window._wSelectPreset('${p.key}')"
              data-key="${p.key}">
        <span class="wcp-preset-swatch" style="background:${p.swatch}"></span>
        ${p.name}
      </button>
    `).join('')
  }

  // ── SELECT PRESET ────────────────────────────────────────────────
  window._wSelectPreset = function(key) {
    const preset = presets.find(p => p.key === key)
    if (!preset) return
    activePreset = key
    applyVars(preset.vars)

    // Sync colour pickers to new primary
    const primaryVar = { retail: '--bark', trade: '--orange', hospitality: '--terracotta', professional: '--gold' }[TEMPLATE]
    const bgVar      = { retail: '--cream', trade: '--bg',    hospitality: '--bg',          professional: '--bg' }[TEMPLATE]
    const accentVar  = { retail: '--tan',   trade: '--surface',hospitality: '--warm',        professional: '--surface' }[TEMPLATE]

    syncPicker('wPrimaryColor', 'wPrimaryHex', preset.vars[primaryVar] || preset.swatch)
    syncPicker('wBgColor',      'wBgHex',      preset.vars[bgVar] || '#FFFFFF')
    syncPicker('wAccentColor',  'wAccentHex',  preset.vars[accentVar] || '#CCCCCC')

    renderPresets()
  }

  function syncPicker(colorId, hexId, value) {
    const colorEl = document.getElementById(colorId)
    const hexEl   = document.getElementById(hexId)
    if (colorEl && value) colorEl.value = value
    if (hexEl && value)   hexEl.value   = value
  }

  // ── CUSTOM COLOUR INPUT ──────────────────────────────────────────
  function setupCustomInputs() {
    const primaryVar = { retail: '--bark', trade: '--orange', hospitality: '--terracotta', professional: '--gold' }[TEMPLATE]
    const bgVar      = { retail: '--cream', trade: '--bg',    hospitality: '--bg',          professional: '--bg' }[TEMPLATE]
    const accentVar  = { retail: '--tan',   trade: '--surface',hospitality: '--warm',        professional: '--surface' }[TEMPLATE]

    // Primary colour
    document.getElementById('wPrimaryColor').addEventListener('input', e => {
      document.documentElement.style.setProperty(primaryVar, e.target.value)
      document.getElementById('wPrimaryHex').value = e.target.value
      activePreset = null
      renderPresets()
    })
    document.getElementById('wPrimaryHex').addEventListener('input', e => {
      const val = e.target.value
      if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
        document.documentElement.style.setProperty(primaryVar, val)
        document.getElementById('wPrimaryColor').value = val
        activePreset = null
        renderPresets()
      }
    })

    // Background colour
    document.getElementById('wBgColor').addEventListener('input', e => {
      document.documentElement.style.setProperty(bgVar, e.target.value)
      document.getElementById('wBgHex').value = e.target.value
    })
    document.getElementById('wBgHex').addEventListener('input', e => {
      const val = e.target.value
      if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
        document.documentElement.style.setProperty(bgVar, val)
        document.getElementById('wBgColor').value = val
      }
    })

    // Accent colour
    document.getElementById('wAccentColor').addEventListener('input', e => {
      document.documentElement.style.setProperty(accentVar, e.target.value)
      document.getElementById('wAccentHex').value = e.target.value
    })
    document.getElementById('wAccentHex').addEventListener('input', e => {
      const val = e.target.value
      if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
        document.documentElement.style.setProperty(accentVar, val)
        document.getElementById('wAccentColor').value = val
      }
    })
  }

  // ── TOGGLE PANEL ─────────────────────────────────────────────────
  window.toggleColourPanel = function() {
    const drawer = document.getElementById('wColourDrawer')
    drawer.classList.toggle('open')
  }

  // ── RESET ────────────────────────────────────────────────────────
  window.resetColours = function() {
    applyVars(originalVars)
    activePreset = null
    renderPresets()

    // Reset pickers to blank
    syncPicker('wPrimaryColor', 'wPrimaryHex', null)
    syncPicker('wBgColor',      'wBgHex',      null)
    syncPicker('wAccentColor',  'wAccentHex',  null)
  }

  // ── SAVE ─────────────────────────────────────────────────────────
  window.saveColours = function() {
    // Collect current CSS variable values
    const style = getComputedStyle(document.documentElement)
    const savedVars = {}
    const allVarNames = presets.flatMap(p => Object.keys(p.vars))
    const unique = [...new Set(allVarNames)]
    unique.forEach(v => {
      savedVars[v] = style.getPropertyValue(v).trim()
    })

    // Store in sessionStorage (backend replaces this with a real API call)
    sessionStorage.setItem('wouessi_colours', JSON.stringify({
      template: TEMPLATE,
      preset: activePreset,
      vars: savedVars,
      savedAt: new Date().toISOString(),
    }))

    // Show saved message
    const msg = document.getElementById('wSavedMsg')
    msg.style.display = 'block'
    setTimeout(() => msg.style.display = 'none', 2000)

    // Backend hook — replace this with your API call
    if (typeof window.onWouessColourSave === 'function') {
      window.onWouessColourSave({ template: TEMPLATE, preset: activePreset, vars: savedVars })
    }
  }

  // ── INIT ─────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    saveOriginals()
    renderPresets()
    setupCustomInputs()

    // Restore saved colours if they exist
    const saved = sessionStorage.getItem('wouessi_colours')
    if (saved) {
      try {
        const { vars, preset } = JSON.parse(saved)
        applyVars(vars)
        activePreset = preset
        renderPresets()
      } catch (_) {}
    }
  })

  // Toggle button click
  document.getElementById('wColourToggle').addEventListener('click', toggleColourPanel)

  // Close on outside click
  document.addEventListener('click', e => {
    const panel = document.getElementById('wColourPanel')
    if (!panel.contains(e.target)) {
      document.getElementById('wColourDrawer').classList.remove('open')
    }
  })

})()
</script>
